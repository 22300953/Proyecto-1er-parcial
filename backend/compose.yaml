services:
  postgres:
    image: docker.io/library/postgres:latest
    container_name: backed-bliss-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: tienda
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5433:5432'
    volumes:
      - pgdata_latest:/var/lib/postgresql
      - ./init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d tienda']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata_latest: