@if (isOpen()) {
  <div class="cart-backdrop" (click)="closeCart()" aria-hidden="true"></div>
}

<aside id="panel-cart" class="cart-menu" [class.open]="isOpen()" [attr.aria-hidden]="!isOpen()">
  <div class="cart-header">
    <h2>Carrito</h2>
    <button type="button" class="close-cart" (click)="closeCart()">X</button>
  </div>

  <!-- Carrito vacío -->
  @if (items().length === 0) {
    <p class="empty">No hay productos en tu carrito.</p>
  }

  <!-- Lista de productos -->
  @for (item of items(); track item.id) {
    <div class="item">
      <img [src]="item.imageUrl" [alt]="item.name" />
      <div>
        <strong>{{ item.name }}</strong>
        <p>{{ item.category }}</p>
        <p>${{ item.price.toFixed(2) }}</p>
      </div>
      <button type="button" (click)="removeItem(item.id)">X</button>
    </div>
  }

  <!-- Formulario sin ngModel -->
  <div class="cart-form">
    <label>
      Nombre:
      <input type="text" [value]="customer.name" (input)="customer.name = $any($event.target).value" />
    </label>

    <label>
      Teléfono:
      <input type="text" [value]="customer.phone" (input)="customer.phone = $any($event.target).value" />
    </label>

    <label>
      Nota:
      <textarea [value]="customer.note" (input)="customer.note = $any($event.target).value"></textarea>
    </label>

    <label>
      Tipo de entrega:
      <select [value]="customer.deliveryType" (change)="customer.deliveryType = $any($event.target).value">
        <option value="store">Recoger en sucursal</option>
        <option value="home">Domicilio</option>
      </select>
    </label>

    @if (customer.deliveryType === 'home') {
      <label>
        Dirección:
        <input type="text" [value]="customer.address" (input)="customer.address = $any($event.target).value" />
      </label>
    }

    <label>
      Tipo de pago:
      <select [value]="customer.paymentType" (change)="customer.paymentType = $any($event.target).value">
        <option value="cash">Efectivo</option>
        <option value="card">Tarjeta</option>
      </select>
    </label>
  </div>

  <p class="total">TOTAL: ${{ total().toFixed(2) }}</p>

  <div class="actions">
    <button class="btn danger" type="button" (click)="clearCart()">Vaciar el carrito :c</button>
    <button class="btn" type="button" (click)="exportOrder()">Hacer pedido</button>
  </div>
</aside>
