@if (isOpen()) {
  <div class="cart-backdrop" (click)="closeCart()" aria-hidden="true"></div>
}

<aside id="panel-cart" class="cart-menu" [class.open]="isOpen()" [attr.aria-hidden]="!isOpen()">
  <div class="cart-header">
    <h2>Carrito</h2>
    <button type="button" class="close-cart" (click)="closeCart()" aria-label="Cerrar carrito">
      X
    </button>
  </div>

  @if (items().length === 0) {
    <p class="empty">No hay productos en tu carrito.</p>
  }

  @for (item of items(); track item.id) {
    <div class="item">
      <img [src]="item.imageUrl" [alt]="item.name" />
      <div>
        <strong>{{ item.name }}</strong>
        <p>{{ item.category }}</p>
        <p>${{ item.price.toFixed(2) }}</p>
      </div>
      <button type="button" (click)="removeItem(item.id)">X</button>
    </div>
  }

  <p class="total">TOTAL: ${{ total().toFixed(2) }}</p>

  <div class="actions">
    <button class="btn danger" type="button" (click)="clearCart()">Vaciar el carrito :c</button>
    <button class="btn" type="button" (click)="exportXml()">Hacer pedido</button>
  </div>
</aside>
