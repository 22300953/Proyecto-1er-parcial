<header class="topbar">
  <div class="brand">
    <img src="/assets/logo.png" alt="Logo" />
    <h1>Backed Bliss</h1>
  </div>
  <div class="topbar-actions">
    <button
      type="button"
      class="carrito-toggle"
      (click)="toggleCart()"
      [attr.aria-expanded]="cartIsOpen()"
      aria-controls="panel-cart"
    >
      Carrito ({{ countItems() }})
    </button>
    <app-cart></app-cart>
    <button type="button" (click)="logOut()">Cerrar sesión</button>
  </div>
</header>

<header class="header">
</header>

<section class="catalog-layout">
  <aside class="filters">
    <p>Productos en venta: {{ inStockCount() }}</p>
    <button type="button" (click)="setFilter('todos')" [class.is-active]="isSelectedFilter('todos')">Todos</button>
    <button type="button" (click)="setFilter('pasteles')" [class.is-active]="isSelectedFilter('pasteles')">Pasteles</button>
    <button type="button" (click)="setFilter('gelatinas')" [class.is-active]="isSelectedFilter('gelatinas')">Gelatinas</button>
    <button type="button" (click)="setFilter('galletas')" [class.is-active]="isSelectedFilter('galletas')">Galletas</button>
    <button type="button" (click)="setFilter('pays')" [class.is-active]="isSelectedFilter('pays')">Pays</button>
    <button type="button" (click)="setFilter('otros')" [class.is-active]="isSelectedFilter('otros')">Otros</button>
  </aside>

  <div class="catalog-content">
    @if (products().length === 0) {
      <p class="empty-state">Cargando productos (o revisa dónde está tu XML).</p>
    } @else if (filteredProducts().length === 0) {
      <p class="empty-state">No hay productos para esta categoría.</p>
    } @else {
      <section class="grid">
        @for (p of filteredProducts(); track p.id) {
          <app-product-card [product]="p" (add)="addToCart($event)"></app-product-card>
        }
      </section>
    }
  </div>
</section>
