<header class="topbar">
  <div class="brand">
    <img src="/assets/logo.png" alt="Logo" />
    <h1>Backed Bliss</h1>
  </div>
  <div class="topbar-actions">
    <button
      type="button"
      class="carrito-toggle"
      (click)="toggleCart()"
      [attr.aria-expanded]="cartIsOpen()"
      aria-controls="panel-cart"
    >
      Cart ({{ countItems() }})
    </button>
    <button type="button" (click)="logOut()">Sign out</button>
  </div>
</header>

<header class="header">
  <h1>Catalog</h1>
  <p>Products in stock: {{ inStockCount() }}</p>
</header>

<div class="filters">
  <button type="button">All</button>
  <button type="button">Cakes</button>
  <button type="button">Gelatins</button>
  <button type="button">Cookies</button>
  <button type="button">Pies</button>
  <button type="button">Other</button>
</div>

@if (products().length === 0) {
  <p>Loading products (or check the XML path).</p>
} @else {
  <section class="grid">
    @for (p of products(); track p.id) {
      <app-product-card [product]="p" (add)="addToCart($event)"></app-product-card>
    }
  </section>
}

<hr class="sep" />
<app-cart></app-cart>
