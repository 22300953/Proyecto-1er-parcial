<header class="topbar">
  <div class="brand">
    <img src="/assets/logo.png" alt="Logo" />
    <h1>Backed Bliss</h1>
  </div>
  <div class="topbar-actions">
    <button
      type="button"
      class="carrito-toggle"
      (click)="toggleCart()"
      [attr.aria-expanded]="cartIsOpen()"
      aria-controls="panel-cart"
    >
      Carrito ({{ countItems() }})
    </button>
    <app-cart></app-cart>
    <button type="button" (click)="logOut()">Cerrar sesión</button>
  </div>
</header>

<header class="header">
</header>

<app-filter-menu (filterChange)="onFilterChange($event)"></app-filter-menu>

<section class="catalog-layout">
  <div class="catalog-content">
    @if (products().length === 0) {
      <p class="empty-state">Cargando productos (o revisa la conexión con la API).</p>
    } @else if (filteredProducts().length === 0) {
      <p class="empty-state">No hay productos para esta categoría.</p>
    } @else {
      <section class="grid">
        @for (p of filteredProducts(); track p.id) {
          <app-product-card [product]="p" (add)="addToCart($event)"></app-product-card>
        }
      </section>
    }
  </div>
</section>
