<header class="topbar">
  <div class="brand">
    <img src="/assets/logo.png" alt="Logo" />
    <h1>Backed Bliss</h1>
  </div>
  <div class="topbar-actions">
    <button
      type="button"
      class="carrito-toggle"
      (click)="toggleCart()"
      [attr.aria-expanded]="cartIsOpen()"
      aria-controls="panel-cart"
    >
      Carrito ({{ countItems() }})
    </button>
    <button type="button" (click)="logOut()">Cerrar sesion</button>
  </div>
</header>

<header class="header">
</header>

<section class="catalog-layout">
  <aside class="filters">
    <p>Productos en venta: {{ inStockCount() }}</p>
    <button type="button">Todos</button>
    <button type="button">Pasteles</button>
    <button type="button">Gelatinas</button>
    <button type="button">Galletas</button>
    <button type="button">Pies</button>
    <button type="button">Otros</button>
  </aside>

  <div class="catalog-content">
    @if (products().length === 0) {
      <p class="empty-state">Cargando productos (o checa donde esta tu xml).</p>
    } @else {
      <section class="grid">
        @for (p of products(); track p.id) {
          <app-product-card [product]="p" (add)="addToCart($event)"></app-product-card>
        }
      </section>
    }
  </div>
</section>
<app-cart></app-cart>
