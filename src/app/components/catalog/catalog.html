<header class="topbar">
  <div class="brand">
    <img src="/assets/logo.png" alt="Logo" />
    <h1>Backed Bliss</h1>
  </div>
  <div class="topbar-actions">
    <button
      type="button"
      class="carrito-toggle"
      (click)="toggleCart()"
      [attr.aria-expanded]="openedCart()"
      aria-controls="panel-carrito"
    >
      Carrito ({{ countItems() }})
    </button>
    <button type="button" (click)="logOut()">Cerrar sesion</button>
  </div>
</header>

<header class="header">
  <h1>Catálogo</h1>
  <p>products en stock: {{ inStockCount() }}</p>
</header>

@if (products().length === 0) {
  <p>Cargando products (o revisa la ruta del XML).</p>
} @else {
  <section class="grid">
    @for (p of products(); track p.id) {
      <app-product-card [product]="p" (add)="agregar($event)"></app-product-card>
    }
  </section>
}

<hr class="sep"/>
<app-cart></app-cart>
