<article class="card">
  <a class="image-link" [routerLink]="['/producto', product.id]" title="Ver detalle del producto">
    <img class="img" [src]="product.imageUrl" [alt]="product.name" (error)="onImageError($event)" />
  </a>

  <div class="body">
    <div class="top">
      <h3 class="title">{{ product.name }}</h3>
      <span class="price">$ {{ product.price }}</span>
    </div>

    <p class="meta">{{ product.category }}</p>
    <p class="desc">{{ product.description }}</p>

    <p class="stock" [class.out]="!product.inStock">
      @if (product.inStock) { Disponible } @else { Agotado }
    </p>

    <button class="btn" [class.btn-added]="recentlyAdded()" [disabled]="!product.inStock" (click)="onAdd()">
      @if (recentlyAdded()) {
        Agregado al carrito
      } @else {
        Agregar al carrito
      }
    </button>
  </div>
</article>
